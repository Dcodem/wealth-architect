<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>File Uploaded - The Wealth Architect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "outline-variant": "#ccc3d8",
        "surface-dim": "#d3daef",
        "surface-variant": "#dce2f7",
        "primary": "#630ed4",
        "background": "#f9f9ff",
        "on-background": "#141b2b",
        "surface-container": "#e9edff",
        "surface-container-lowest": "#ffffff",
        "primary-fixed-dim": "#d2bbff",
        "surface": "#f9f9ff",
        "primary-container": "#7c3aed",
        "error": "#ba1a1a",
        "outline": "#7b7487",
        "surface-tint": "#732ee4",
        "primary-fixed": "#eaddff",
        "on-surface": "#141b2b",
        "surface-container-high": "#e1e8fd",
        "on-primary": "#ffffff",
        "surface-container-low": "#f1f3ff",
        "on-surface-variant": "#4a4455",
        "secondary": "#6a4fa0",
        "secondary-container": "#c4a7ff",
        "secondary-fixed": "#eaddff",
        "secondary-fixed-dim": "#d2bbff",
        "on-secondary": "#ffffff",
        "on-primary-container": "#ede0ff",
        "on-secondary-container": "#523787",
        "surface-container-highest": "#dce2f7",
        "error-container": "#ffdad6",
        "on-error-container": "#93000a",
        "on-error": "#ffffff",
        "inverse-surface": "#293040",
        "inverse-on-surface": "#edf0ff",
        "on-secondary-fixed": "#25005a",
        "on-primary-fixed": "#25005a",
      },
      fontFamily: {
        "headline": ["Manrope"],
        "body": ["Inter"],
        "label": ["Inter"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  display: inline-block;
  line-height: 1;
  text-transform: none;
  letter-spacing: normal;
  word-wrap: normal;
  white-space: nowrap;
  direction: ltr;
  vertical-align: middle;
}
.glass-card {
  background: rgba(255, 255, 255, 0.8);
  backdrop-filter: blur(12px);
}
</style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">

<!-- Header -->
<header class="fixed top-0 w-full flex justify-center items-center py-8 z-50">
  <div class="flex flex-col items-center">
    <h1 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">
      The Wealth Architect
    </h1>
  </div>
</header>

<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-24 pb-32">
  <div class="max-w-[1440px] w-full flex justify-center">
    <!-- Centered Onboarding Card -->
    <div class="w-full max-w-2xl bg-surface-container-lowest rounded-xl shadow-[0_12px_32px_rgba(20,27,43,0.04)] p-12 relative overflow-hidden">
      <!-- Background Accent Gradient -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed-dim/10 rounded-full -mr-32 -mt-32 blur-3xl pointer-events-none"></div>

      <div class="relative z-10 flex flex-col items-center text-center">
        <!-- Title Section -->
        <h1 class="font-headline font-extrabold text-[2rem] leading-tight mb-4 text-on-surface">File Uploaded</h1>
        <p class="font-body text-on-surface-variant max-w-md mb-10">
          Your transaction history has been successfully parsed. We are ready to structure your wealth portfolio.
        </p>

        <!-- Success Upload Zone -->
        <div class="w-full bg-surface-container-low rounded-xl p-6 mb-10 flex items-center justify-between border-2 border-dashed border-transparent transition-all">
          <div class="flex items-center space-x-4">
            <div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center text-on-primary">
              <span class="material-symbols-outlined">description</span>
            </div>
            <div class="text-left">
              <div class="font-headline font-bold text-on-surface">2023_property_transactions.csv</div>
              <div class="font-label text-xs text-on-surface-variant">2.4 MB</div>
            </div>
          </div>
          <div class="flex items-center space-x-6">
            <div class="flex items-center text-emerald-600 font-semibold text-sm">
              <span class="material-symbols-outlined mr-1" style="font-variation-settings: 'FILL' 1;">check_circle</span>
              Verified
            </div>
            <button class="text-sm font-semibold text-error hover:opacity-80 transition-opacity">
              Remove
            </button>
          </div>
        </div>

        <!-- Action Area -->
        <div class="w-full space-y-6">
          <button class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 rounded-lg shadow-lg hover:opacity-90 active:scale-95 transition-all duration-150">
            Continue
          </button>
          <div class="flex justify-center">
            <a class="font-label text-sm font-semibold text-on-surface-variant hover:text-primary transition-colors" href="#">
              Skip for now
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>

<!-- Bottom Step Indicator Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-12">
  <div class="flex items-center justify-center space-x-3">
    <!-- Step 1: Completed -->
    <div class="h-2 w-2 rounded-full bg-primary/30"></div>
    <!-- Step 2: Active -->
    <div class="h-2 w-8 rounded-full bg-primary shadow-[0_0_8px_rgba(99,14,212,0.3)]"></div>
    <!-- Step 3 -->
    <div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
    <!-- Step 4 -->
    <div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
  </div>
</nav>
<div class="fixed bottom-0 left-0 w-full z-40 flex justify-center pb-5">
  <span class="font-headline text-xs font-semibold uppercase tracking-widest text-violet-600">Step 2 of 4</span>
</div>

<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 opacity-20 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-bl from-primary-fixed to-transparent rounded-full blur-[120px]"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 opacity-10 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-tr from-secondary-fixed to-transparent rounded-full blur-[100px]"></div>
</div>

</body>
</html>
