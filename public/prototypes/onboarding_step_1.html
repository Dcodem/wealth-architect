<!DOCTYPE html>
<html class="light" lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Upload Documents - The Wealth Architect</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script>
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "outline-variant": "#ccc3d8",
        "surface-dim": "#d3daef",
        "surface-variant": "#dce2f7",
        "primary": "#630ed4",
        "background": "#f9f9ff",
        "on-background": "#141b2b",
        "surface-container": "#e9edff",
        "surface-container-lowest": "#ffffff",
        "primary-fixed-dim": "#d2bbff",
        "surface": "#f9f9ff",
        "primary-container": "#7c3aed",
        "error": "#ba1a1a",
        "outline": "#7b7487",
        "surface-tint": "#732ee4",
        "primary-fixed": "#eaddff",
        "on-surface": "#141b2b",
        "surface-container-high": "#e1e8fd",
        "on-primary": "#ffffff",
        "surface-container-low": "#f1f3ff",
        "on-surface-variant": "#4a4455",
        "secondary": "#6a4fa0",
        "secondary-container": "#c4a7ff",
        "secondary-fixed": "#eaddff",
        "secondary-fixed-dim": "#d2bbff",
        "on-secondary": "#ffffff",
        "on-primary-container": "#ede0ff",
        "on-secondary-container": "#523787",
        "surface-container-highest": "#dce2f7",
        "error-container": "#ffdad6",
        "on-error-container": "#93000a",
        "on-error": "#ffffff",
        "inverse-surface": "#293040",
        "inverse-on-surface": "#edf0ff",
        "on-secondary-fixed": "#25005a",
        "on-primary-fixed": "#25005a",
      },
      fontFamily: {
        "headline": ["Manrope"],
        "body": ["Inter"],
        "label": ["Inter"]
      },
      borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
    },
  },
}
</script>
<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  display: inline-block;
  line-height: 1;
  text-transform: none;
  letter-spacing: normal;
  word-wrap: normal;
  white-space: nowrap;
  direction: ltr;
  vertical-align: middle;
}
.glass-effect {
  backdrop-filter: blur(12px);
  background: rgba(255, 255, 255, 0.8);
}
</style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex flex-col">

<!-- Header -->
<header class="fixed top-0 w-full flex justify-center items-center py-8 z-50">
  <div class="flex flex-col items-center">
    <h1 class="font-headline font-extrabold text-2xl tracking-tight text-on-surface">
      The Wealth Architect
    </h1>
  </div>
</header>

<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-4 pt-24 pb-32">
  <section class="max-w-[1440px] w-full flex justify-center">
    <!-- Onboarding Card -->
    <div class="w-full max-w-2xl bg-surface-container-lowest p-12 rounded-xl shadow-[0_12px_32px_rgba(20,27,43,0.04)] flex flex-col items-center text-center relative overflow-hidden">
      <!-- Background Accent Gradient -->
      <div class="absolute top-0 right-0 w-64 h-64 bg-primary-fixed-dim/10 rounded-full -mr-32 -mt-32 blur-3xl pointer-events-none"></div>

      <div class="relative z-10 w-full flex flex-col items-center">
        <!-- Headline Group -->
        <div class="mb-10 space-y-3">
          <h2 class="font-headline font-extrabold text-[2rem] leading-tight text-on-surface">
            Upload Your Documents
          </h2>
          <p class="text-on-surface-variant font-body text-base">
            Import your financial records to get started
          </p>
        </div>

        <!-- Drag & Drop Upload Zone -->
        <div class="w-full h-[240px] border-2 border-dashed border-outline-variant rounded-xl bg-surface-container-low/50 hover:bg-surface-container-low transition-colors group cursor-pointer flex flex-col items-center justify-center p-6 relative overflow-hidden">
          <!-- Subtle Background Pattern -->
          <div class="absolute inset-0 opacity-[0.03] pointer-events-none" style="background-image: radial-gradient(#630ed4 1px, transparent 1px); background-size: 20px 20px;"></div>
          <div class="relative z-10 flex flex-col items-center">
            <div class="w-16 h-16 rounded-full bg-primary-fixed flex items-center justify-center mb-4 group-hover:scale-110 transition-transform duration-300">
              <span class="material-symbols-outlined text-primary text-3xl">cloud_upload</span>
            </div>
            <p class="font-headline font-semibold text-lg text-on-surface mb-1">
              Drag &amp; Drop your files here
            </p>
            <p class="font-body text-primary font-medium hover:underline">
              or click to browse
            </p>
          </div>
          <!-- Accepted Formats -->
          <div class="mt-8 flex gap-4">
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container-highest/50">
              <span class="material-symbols-outlined text-on-surface-variant text-base">description</span>
              <span class="text-xs font-label font-medium text-on-surface-variant">PDF</span>
            </div>
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container-highest/50">
              <span class="material-symbols-outlined text-on-surface-variant text-base">table_chart</span>
              <span class="text-xs font-label font-medium text-on-surface-variant">CSV</span>
            </div>
            <div class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-surface-container-highest/50">
              <span class="material-symbols-outlined text-on-surface-variant text-base">grid_on</span>
              <span class="text-xs font-label font-medium text-on-surface-variant">Excel</span>
            </div>
          </div>
        </div>

        <!-- Action Footer -->
        <div class="mt-12 w-full space-y-6">
          <button class="w-full py-4 px-8 rounded-lg bg-surface-container-highest text-on-surface-variant font-headline font-bold text-base cursor-not-allowed tracking-wide opacity-60" disabled>
            Continue
          </button>
          <div class="flex justify-center">
            <button class="text-on-surface-variant hover:text-primary font-body text-sm font-medium transition-colors">
              Skip for now
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<!-- Bottom Step Indicator Nav -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-center items-center px-4 pb-12">
  <div class="flex items-center justify-center space-x-3">
    <!-- Step 1: Active -->
    <div class="h-2 w-8 rounded-full bg-primary shadow-[0_0_8px_rgba(99,14,212,0.3)]"></div>
    <!-- Step 2 -->
    <div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
    <!-- Step 3 -->
    <div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
    <!-- Step 4 -->
    <div class="h-2 w-2 rounded-full bg-surface-container-highest"></div>
  </div>
  <div class="absolute flex items-center space-x-2 text-violet-600" style="bottom: 3rem; transform: translateX(6.5rem);">
    <span class="material-symbols-outlined text-[10px]" style="font-variation-settings: 'FILL' 1; font-size: 10px;">fiber_manual_record</span>
    <span class="font-headline text-xs font-semibold uppercase tracking-widest">Step 1 of 4</span>
  </div>
</nav>

<!-- Step label centered below dots -->
<div class="fixed bottom-0 left-0 w-full z-40 flex justify-center pb-5">
  <span class="font-headline text-xs font-semibold uppercase tracking-widest text-violet-600">Step 1 of 4</span>
</div>

<!-- Background Decoration -->
<div class="fixed top-0 right-0 -z-10 w-1/3 h-1/2 opacity-20 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-bl from-primary-fixed to-transparent rounded-full blur-[120px]"></div>
</div>
<div class="fixed bottom-0 left-0 -z-10 w-1/4 h-1/3 opacity-10 pointer-events-none">
  <div class="absolute inset-0 bg-gradient-to-tr from-secondary-fixed to-transparent rounded-full blur-[100px]"></div>
</div>

</body>
</html>
